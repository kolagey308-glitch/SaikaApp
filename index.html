<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAIKA PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-glass: rgba(15, 20, 35, 0.85);
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #ffffff;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --glow: 0 0 60px rgba(59, 130, 246, 0.4);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 85px;
            animation: fadeIn 0.4s ease;
            backdrop-filter: blur(20px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 50px rgba(59, 130, 246, 0.6); }
        }

        /* Загрузочный экран */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 100px;
            height: 100px;
            background-image: url('https://files.catbox.moe/h05hbj.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: var(--glow);
            animation: pulse 1.8s infinite, glowPulse 2s infinite;
            border: 2px solid var(--primary);
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(59, 130, 246, 0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Шапка */
        .header {
            padding: 20px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideDown 0.5s ease;
        }

        .header-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-badge {
            background: rgba(59, 130, 246, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: var(--primary-light);
            border: 1px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Страницы */
        .page {
            display: none;
            padding: 0 16px;
            animation: slideUp 0.4s ease;
        }

        .page.active {
            display: block;
        }

        /* Категории */
        .category-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-light);
            margin: 28px 0 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title i {
            font-size: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Карточка товара */
        .product-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--card-shadow);
            animation: slideUp 0.4s ease;
        }

        .product-card:active {
            transform: scale(0.97);
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
        }

        .product-icon {
            width: 58px;
            height: 58px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
            font-size: 26px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--primary-light);
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 17px;
        }

        .price-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-new {
            color: var(--success);
            font-size: 22px;
            font-weight: 800;
        }

        .stock {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Профиль */
        .profile-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            animation: slideUp 0.5s ease;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: var(--glow);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .profile-id {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
            background: rgba(255,255,255,0.03);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid var(--border);
        }

        .profile-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-telegram {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-telegram:active {
            transform: scale(0.96);
            background: #2563eb;
        }

        .btn-owner {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-owner:active {
            background: rgba(255,255,255,0.1);
        }

        /* Меню снизу */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            display: flex;
            padding: 10px 16px 25px;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 40px;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Страница оплаты */
        .payment-page {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 30px 24px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }

        .payment-title {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0;
        }

        .payment-method {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-method:active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
        }

        .payment-method.selected {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .method-icon {
            width: 50px;
            height: 50px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .method-info {
            flex: 1;
        }

        .method-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .method-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .method-price {
            font-weight: 700;
            color: var(--success);
            font-size: 18px;
        }

        /* Реквизиты */
        .bank-details {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 22px;
            margin: 24px 0;
            border: 1px solid var(--border);
        }

        .bank-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        .bank-row:last-child {
            margin-bottom: 0;
        }

        .bank-icon {
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-light);
        }

        .bank-info {
            flex: 1;
        }

        .bank-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .bank-value {
            font-size: 17px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .copy-btn {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Кнопки */
        .btn {
            padding: 18px 24px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Заказы */
        .order-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .order-status {
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 600;
        }

        .order-status.pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .order-status.confirmed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .order-product {
            font-weight: 700;
            font-size: 17px;
            margin-bottom: 8px;
        }

        .order-price {
            color: var(--success);
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .order-screenshot {
            margin: 14px 0;
            max-height: 200px;
            overflow: hidden;
            border-radius: 18px;
            cursor: pointer;
        }

        .order-screenshot img {
            width: 100%;
            object-fit: cover;
            border-radius: 18px;
        }

        .order-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .order-actions .btn {
            padding: 12px;
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 700; margin-bottom: 4px; }
        .toast-message { font-size: 13px; color: var(--text-secondary); }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 56px;
            margin-bottom: 20px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<!-- Загрузочный экран -->
<div class="loading-screen" id="loadingScreen">
    <div class="loading-logo"></div>
    <div class="loading-spinner"></div>
    <div class="loading-text">SAIKA PREMIUM</div>
</div>

<!-- Шапка -->
<div class="header">
    <div class="header-title">SAIKA</div>
    <div class="header-badge"><i class="fas fa-crown"></i> PREMIUM</div>
</div>

<!-- СТРАНИЦЫ -->
<div id="shopPage" class="page active">
    <div id="productsList"></div>
</div>

<div id="profilePage" class="page">
    <div class="profile-card">
        <img id="profilePhoto" class="profile-avatar" src="">
        <h3 id="profileName" class="profile-name"></h3>
        <p id="profileId" class="profile-id"></p>
        <div class="profile-buttons">
            <a class="btn-telegram" href="https://t.me/+4rRVQ23siDI0YWYy" target="_blank">
                <i class="fab fa-telegram"></i> Telegram Канал
            </a>
            <a class="btn-owner" href="https://t.me/saikamng" target="_blank">
                <i class="fas fa-user"></i> Приобрести у владельца
            </a>
            <a class="btn-owner" href="https://t.me/saikarepa" target="_blank">
                <i class="fas fa-star"></i> Отзывы
            </a>
        </div>
    </div>
</div>

<div id="ordersPage" class="page">
    <h3 style="margin-bottom: 20px;"><i class="fas fa-history" style="color: var(--primary);"></i> История заказов</h3>
    <div id="myOrdersList"></div>
</div>

<div id="adminPage" class="page">
    <h3 style="margin-bottom: 20px;"><i class="fas fa-clipboard-list" style="color: var(--primary);"></i> Заказы на проверку</h3>
    <div id="adminOrdersList"></div>
</div>

<!-- Страница оплаты -->
<div id="paymentPage" class="page">
    <div class="payment-page">
        <div class="payment-title">
            <i class="fas fa-shopping-cart" style="color: var(--primary);"></i>
            <span id="paymentProductName"></span>
        </div>
        <div style="font-size: 42px; font-weight: 800; color: var(--success); text-align: center;" id="paymentPrice"></div>
        
        <div class="payment-methods">
            <div class="payment-method" onclick="selectPayment('rf')" id="methodRf">
                <div class="method-icon"><i class="fas fa-credit-card"></i></div>
                <div class="method-info">
                    <div class="method-name">🇷🇺 РФ Карта</div>
                    <div class="method-desc">Т-Банк · мгновенно</div>
                </div>
                <div class="method-price" id="priceRf"></div>
            </div>
            <div class="payment-method" onclick="selectPayment('mono')" id="methodMono">
                <div class="method-icon"><i class="fas fa-university"></i></div>
                <div class="method-info">
                    <div class="method-name">🇺🇦 МоноБанк</div>
                    <div class="method-desc">Гривна · мгновенно</div>
                </div>
                <div class="method-price" id="priceMono"></div>
            </div>
            <div class="payment-method" onclick="selectPayment('crypto')" id="methodCrypto">
                <div class="method-icon"><i class="fab fa-bitcoin"></i></div>
                <div class="method-info">
                    <div class="method-name">💎 CryptoBot</div>
                    <div class="method-desc">USDT · BEP20</div>
                </div>
                <div class="method-price" id="priceCrypto"></div>
            </div>
        </div>
        
        <div id="bankDetails" style="display: none;">
            <!-- Динамически заполняется -->
        </div>
        
        <button class="btn btn-success" id="payButton" onclick="proceedToUpload()">
            <i class="fas fa-check-circle"></i> Я ОПЛАТИЛ, ЗАГРУЗИТЬ ЧЕК
        </button>
        <button class="btn btn-outline" onclick="goBack()" style="margin-top: 12px;">
            <i class="fas fa-arrow-left"></i> НАЗАД
        </button>
    </div>
</div>

<!-- Страница загрузки чека -->
<div id="uploadPage" class="page">
    <div class="payment-page">
        <div class="payment-title">
            <i class="fas fa-cloud-upload-alt"></i> Загрузить чек
        </div>
        <h3 id="uploadProductName" style="text-align: center; margin-bottom: 20px;"></h3>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()" style="
            background: rgba(59,130,246,0.05);
            border: 2px dashed var(--primary);
            border-radius: 24px;
            padding: 50px 20px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
        ">
            <i class="fas fa-cloud-upload-alt" style="font-size: 52px; color: var(--primary); margin-bottom: 16px;"></i>
            <p style="font-weight: 600; font-size: 16px;">Нажмите чтобы выбрать скриншот</p>
            <p style="font-size: 13px; color: var(--text-secondary); margin-top: 8px;">JPG, PNG до 10MB</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(this)">
        
        <img id="previewImage" style="width: 100%; border-radius: 20px; margin: 20px 0; display: none;">
        
        <textarea id="orderComment" placeholder="Комментарий к платежу..." style="
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            color: var(--text);
            font-size: 15px;
            margin: 16px 0;
            resize: vertical;
        "></textarea>
        
        <button class="btn btn-success" id="sendOrderBtn" onclick="sendOrder()" disabled>
            <i class="fas fa-paper-plane"></i> ОТПРАВИТЬ НА ПРОВЕРКУ
        </button>
        <button class="btn btn-outline" onclick="goBackToPayment()" style="margin-top: 12px;">
            <i class="fas fa-arrow-left"></i> НАЗАД
        </button>
    </div>
</div>

<!-- Меню снизу -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('shop')">
        <i class="fas fa-store"></i>
        <span>Магазин</span>
    </div>
    <div class="nav-item" onclick="switchPage('orders')">
        <i class="fas fa-history"></i>
        <span>Заказы</span>
    </div>
    <div class="nav-item" onclick="switchPage('profile')">
        <i class="fas fa-user"></i>
        <span>Профиль</span>
    </div>
    <div class="nav-item" id="adminNavItem" style="display: none;" onclick="switchPage('admin')">
        <i class="fas fa-clipboard-list"></i>
        <span>Проверка</span>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const MAIN_ADMIN = 1471307057;
    const SECOND_ADMIN = 7066870264;
    const ADMIN_IDS = [MAIN_ADMIN, SECOND_ADMIN];
    
    let currentUser = tg.initDataUnsafe.user || { id: 0, first_name: 'Гость' };
    let isAdmin = ADMIN_IDS.includes(currentUser.id);
    
    let currentProduct = null;
    let selectedPayment = null;
    let selectedFile = null;
    let orders = JSON.parse(localStorage.getItem('saika_orders') || '[]');
    
    const products = {
        vpn: [
            {name:"SAIKA S1 VPN", price:1199, stock:"9", icon:'fa-bolt'},
            {name:"VIP VPN", price:529, stock:"10", icon:'fa-crown'},
            {name:"GTR VPN", price:899, stock:"∞", icon:'fa-car'},
            {name:"ULTRA MAX VPN", price:629, stock:"8", icon:'fa-fire'},
            {name:"STRONG VPN", price:499, stock:"∞", icon:'fa-dumbbell'},
            {name:"UNLY VPN", price:399, stock:"∞", icon:'fa-infinity'},
            {name:"TDM SKILL VPN", price:199, stock:"∞", icon:'fa-crosshairs'},
            {name:"FUCK VPN", price:139, stock:"∞", icon:'fa-skull'},
            {name:"DEAD ALL VPN", price:1299, stock:"∞", icon:'fa-ghost'}
        ],
        extra: [
            {name:"Магнит андроид", price:259, stock:"∞", icon:'fa-android'},
            {name:"Магнит ios", price:269, stock:"∞", icon:'fa-apple'},
            {name:"Пак сайки", price:1789, stock:"∞", icon:'fa-box-open'},
            {name:"Пак unly", price:1299, stock:"10", icon:'fa-archive'}
        ],
        dns: [
            {name:"DNS android", price:239, stock:"∞", icon:'fa-network-wired'},
            {name:"DNS Ios", price:239, stock:"∞", icon:'fa-wifi'}
        ]
    };
    
    // Скрыть загрузочный экран
    setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hidden');
    }, 1500);
    
    function showToast(title, message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
            <div class="toast-content">
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function init() {
        if (isAdmin) {
            document.getElementById('adminNavItem').style.display = 'flex';
        }
        
        const avatar = document.getElementById('profilePhoto');
        if (currentUser.photo_url) {
            avatar.src = currentUser.photo_url;
        } else {
            avatar.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.first_name || 'U') + '&background=3b82f6&color=fff&size=100';
        }
        
        document.getElementById('profileName').innerText = currentUser.first_name + (currentUser.last_name ? ' ' + currentUser.last_name : '');
        document.getElementById('profileId').innerHTML = '<i class="fas fa-id-card"></i> ID: ' + currentUser.id;
        
        renderProducts();
        renderMyOrders();
        renderAdminOrders();
    }
    
    function renderProducts() {
        let html = '';
        
        html += `<div class="category-title"><i class="fas fa-shield-virus"></i> VPN ДЛЯ PUBG</div>`;
        products.vpn.forEach(p => html += renderProductCard(p));
        
        html += `<div class="category-title"><i class="fas fa-cubes"></i> МАГНИТ & ПАКИ</div>`;
        products.extra.forEach(p => html += renderProductCard(p));
        
        html += `<div class="category-title"><i class="fas fa-globe"></i> DNS СЕРВИСЫ</div>`;
        products.dns.forEach(p => html += renderProductCard(p));
        
        document.getElementById('productsList').innerHTML = html;
    }
    
    function renderProductCard(p) {
        return `
            <div class="product-card" onclick="openPaymentPage('${p.name}', ${p.price})">
                <div class="product-icon"><i class="fas ${p.icon}"></i></div>
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="price-box">
                        <span class="price-new">${p.price} ₽</span>
                    </div>
                    <div class="stock"><i class="fas fa-box"></i> В наличии: ${p.stock} шт.</div>
                </div>
                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
            </div>
        `;
    }
    
    function renderMyOrders() {
        let userOrders = orders.filter(o => o.userId === currentUser.id);
        if (userOrders.length === 0) {
            document.getElementById('myOrdersList').innerHTML = `<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>У вас пока нет заказов</p></div>`;
            return;
        }
        
        let html = '';
        userOrders.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(order => {
            const date = new Date(order.timestamp).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            let statusIcon = '⏳', statusText = 'Ожидает', statusClass = 'pending';
            if (order.status === 'confirmed') { statusIcon = '✅'; statusText = 'Выполнен'; statusClass = 'confirmed'; }
            else if (order.status === 'declined') { statusIcon = '❌'; statusText = 'Отклонён'; statusClass = 'declined'; }
            
            html += `
                <div class="order-card">
                    <div class="order-header">
                        <span><i class="fas fa-user"></i> ${order.product}</span>
                        <span class="order-status ${statusClass}">${statusIcon} ${statusText}</span>
                    </div>
                    <div class="order-price">${order.price} ₽</div>
                    <div style="color: var(--text-secondary); font-size: 13px;"><i class="far fa-calendar"></i> ${date}</div>
                    ${order.comment ? `<div style="margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 14px;"><i class="fas fa-comment"></i> ${order.comment}</div>` : ''}
                </div>
            `;
        });
        document.getElementById('myOrdersList').innerHTML = html;
    }
    
    function renderAdminOrders() {
        if (!isAdmin) return;
        let pendingOrders = orders.filter(o => o.status === 'pending');
        if (pendingOrders.length === 0) {
            document.getElementById('adminOrdersList').innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>Нет заказов на проверку</p></div>`;
            return;
        }
        
        let html = '';
        pendingOrders.forEach(order => {
            const date = new Date(order.timestamp).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            html += `
                <div class="order-card">
                    <div class="order-header">
                        <span><i class="fas fa-user"></i> @${order.username || 'User'} (ID: ${order.userId})</span>
                        <span class="order-status pending"><i class="fas fa-clock"></i> Ожидает</span>
                    </div>
                    <div class="order-product">${order.product}</div>
                    <div class="order-price">${order.price} ₽</div>
                    <div style="color: var(--text-secondary); font-size: 13px; margin: 8px 0;"><i class="far fa-calendar"></i> ${date}</div>
                    ${order.comment ? `<div style="margin: 12px 0; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 14px;"><i class="fas fa-comment"></i> ${order.comment}</div>` : ''}
                    ${order.screenshot ? `
                        <div class="order-screenshot" onclick="window.open('${order.screenshot}')">
                            <img src="${order.screenshot}">
                        </div>
                    ` : ''}
                    <div class="order-actions">
                        <button class="btn btn-success" onclick="confirmOrder('${order.id}')"><i class="fas fa-check"></i> Подтвердить</button>
                        <button class="btn btn-danger" onclick="declineOrder('${order.id}')"><i class="fas fa-times"></i> Отклонить</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('adminOrdersList').innerHTML = html;
    }
    
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        if (page === 'shop') {
            document.getElementById('shopPage').classList.add('active');
            document.querySelectorAll('.nav-item')[0].classList.add('active');
        } else if (page === 'orders') {
            document.getElementById('ordersPage').classList.add('active');
            document.querySelectorAll('.nav-item')[1].classList.add('active');
            renderMyOrders();
        } else if (page === 'profile') {
            document.getElementById('profilePage').classList.add('active');
            document.querySelectorAll('.nav-item')[2].classList.add('active');
        } else if (page === 'admin' && isAdmin) {
            document.getElementById('adminPage').classList.add('active');
            document.querySelectorAll('.nav-item')[3].classList.add('active');
            renderAdminOrders();
        }
    }
    
    function openPaymentPage(name, price) {
        currentProduct = { name, price };
        document.getElementById('paymentProductName').innerText = name;
        document.getElementById('paymentPrice').innerText = price + ' ₽';
        
        const priceUah = Math.round(price / 2.5);
        const priceUsdt = (price / 90).toFixed(2);
        
        document.getElementById('priceRf').innerText = price + ' ₽';
        document.getElementById('priceMono').innerText = priceUah + ' ₴';
        document.getElementById('priceCrypto').innerText = priceUsdt + ' USDT';
        
        switchPage('payment');
        document.getElementById('paymentPage').classList.add('active');
        document.querySelectorAll('.page').forEach(p => { if (p.id !== 'paymentPage') p.classList.remove('active'); });
    }
    
    function selectPayment(method) {
        selectedPayment = method;
        document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
        document.getElementById('method' + method.charAt(0).toUpperCase() + method.slice(1)).classList.add('selected');
        
        const details = document.getElementById('bankDetails');
        const price = currentProduct.price;
        
        if (method === 'rf') {
            details.innerHTML = `
                <div class="bank-details">
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-university"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Банк</div>
                            <div class="bank-value">Т-Банк</div>
                        </div>
                    </div>
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-credit-card"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Карта</div>
                            <div class="bank-value">2200 7021 4895 7363</div>
                        </div>
                        <button class="copy-btn" onclick="copyText('2200702148957363')"><i class="fas fa-copy"></i></button>
                    </div>
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-user"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Получатель</div>
                            <div class="bank-value">Саид К.</div>
                        </div>
                    </div>
                </div>
            `;
        } else if (method === 'mono') {
            details.innerHTML = `
                <div class="bank-details">
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-university"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Банк</div>
                            <div class="bank-value">МоноБанк</div>
                        </div>
                    </div>
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-credit-card"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Карта</div>
                            <div class="bank-value">4441 1110 0801 1946</div>
                        </div>
                        <button class="copy-btn" onclick="copyText('4441111008011946')"><i class="fas fa-copy"></i></button>
                    </div>
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-user"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Получатель</div>
                            <div class="bank-value">Ілля Х.</div>
                        </div>
                    </div>
                </div>
            `;
        } else if (method === 'crypto') {
            details.innerHTML = `
                <div class="bank-details">
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fab fa-bitcoin"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">Сеть</div>
                            <div class="bank-value">BEP20 (BSC)</div>
                        </div>
                    </div>
                    <div class="bank-row">
                        <div class="bank-icon"><i class="fas fa-wallet"></i></div>
                        <div class="bank-info">
                            <div class="bank-label">USDT Адрес</div>
                            <div class="bank-value" style="font-size: 13px;">0xYOUR_USDT_ADDRESS</div>
                        </div>
                        <button class="copy-btn" onclick="copyText('0xYOUR_USDT_ADDRESS')"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
            `;
        }
        
        details.style.display = 'block';
        document.getElementById('payButton').style.display = 'flex';
    }
    
    function copyText(text) {
        navigator.clipboard?.writeText(text);
        showToast('✅ Скопировано', 'Данные в буфере обмена', 'success');
    }
    
    function proceedToUpload() {
        if (!selectedPayment) {
            showToast('⚠️ Выберите способ', 'Выберите способ оплаты', 'error');
            return;
        }
        
        document.getElementById('uploadProductName').innerText = `${currentProduct.name} - ${currentProduct.price} ₽ (${selectedPayment.toUpperCase()})`;
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('uploadPage').classList.add('active');
    }
    
    function goBack() {
        switchPage('shop');
    }
    
    function goBackToPayment() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('paymentPage').classList.add('active');
    }
    
    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('previewImage').style.display = 'block';
                document.getElementById('sendOrderBtn').disabled = false;
            };
            reader.readAsDataURL(selectedFile);
        }
    }
    
    function sendOrder() {
        const comment = document.getElementById('orderComment').value;
        const reader = new FileReader();
        reader.onload = (e) => {
            const orderId = Date.now() + '_' + currentUser.id;
            const order = {
                id: orderId,
                userId: currentUser.id,
                username: currentUser.username || currentUser.first_name,
                product: currentProduct.name,
                price: currentProduct.price,
                paymentMethod: selectedPayment,
                comment: comment,
                screenshot: e.target.result,
                status: 'pending',
                timestamp: new Date().toISOString()
            };
            
            orders.push(order);
            localStorage.setItem('saika_orders', JSON.stringify(orders));
            
            tg.sendData(JSON.stringify({ action: 'new_order', order: order }));
            
            showToast('✅ Заказ отправлен!', 'Ожидайте проверки', 'success');
            
            selectedFile = null;
            selectedPayment = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('orderComment').value = '';
            document.getElementById('previewImage').style.display = 'none';
            
            switchPage('orders');
        };
        
        if (selectedFile) {
            reader.readAsDataURL(selectedFile);
        }
    }
    
    function confirmOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        order.status = 'confirmed';
        localStorage.setItem('saika_orders', JSON.stringify(orders));
        tg.sendData(JSON.stringify({ action: 'confirm_order', order: order }));
        showToast('✅ Подтверждено', 'Заказ выполнен', 'success');
        renderAdminOrders();
    }
    
    function declineOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        order.status = 'declined';
        localStorage.setItem('saika_orders', JSON.stringify(orders));
        tg.sendData(JSON.stringify({ action: 'decline_order', order: order }));
        showToast('❌ Отклонено', '', 'error');
        renderAdminOrders();
    }
    
    init();
    tg.MainButton.hide();
</script>
</body>
