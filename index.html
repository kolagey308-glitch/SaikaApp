<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAIKA PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
    <style>
        :root {
            --bg: #0a0f1e;
            --card-bg: rgba(25, 32, 50, 0.7);
            --blue-grad: linear-gradient(135deg, #0088ff 0%, #00ccff 100%);
            --neon-blue: #00d2ff;
            --price-green: #00ff88;
            --old-red: #ff3b3b;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -10%, #1a2a4a 0%, var(--bg) 80%);
            color: var(--text-main); 
            overflow-x: hidden; 
            padding-bottom: 40px; 
            min-height: 100vh;
        }

        .header { padding: 45px 20px 30px; text-align: center; }
        .logo-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
        }
        .logo-main {
            width: 100%;
            height: 100%;
            background: var(--blue-grad);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 15px 35px rgba(0, 136, 255, 0.4);
            transform: rotate(-5deg);
        }

        .brand-title { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #fff; margin-bottom: 5px; }
        .brand-subtitle { font-size: 11px; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 4px; font-weight: 700; opacity: 0.8; }

        .navigation {
            display: flex;
            background: var(--card-bg);
            margin: 0 20px 30px;
            padding: 7px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
        }
        .nav-link {
            flex: 1;
            padding: 15px;
            border-radius: 16px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-link.active {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .page { display: none; padding: 0 20px; animation: slideUp 0.5s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .section-header {
            font-size: 12px;
            font-weight: 900;
            color: var(--neon-blue);
            margin: 35px 0 20px 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.2s;
        }
        .product-card:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        .product-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 136, 255, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            color: var(--neon-blue);
            font-size: 26px;
            border: 1px solid rgba(0, 136, 255, 0.2);
        }

        .product-info { flex: 1; }
        .product-name { font-size: 17px; font-weight: 800; margin-bottom: 6px; color: #fff; }
        
        .price-container { display: flex; align-items: center; gap: 10px; }
        .price-new { font-size: 22px; font-weight: 900; color: var(--price-green); text-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .price-old { font-size: 13px; font-weight: 600; color: var(--old-red); text-decoration: line-through; opacity: 0.9; }
        
        .availability { font-size: 11px; color: #5c657a; margin-top: 8px; font-weight: 600; }

        .profile-container {
            background: linear-gradient(180deg, var(--card-bg) 0%, rgba(10,15,30,0) 100%);
            border-radius: 35px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .user-pic {
            width: 110px;
            height: 110px;
            border-radius: 38px;
            border: 4px solid var(--neon-blue);
            margin-bottom: 20px;
            padding: 5px;
            box-shadow: 0 20px 40px rgba(0, 136, 255, 0.2);
            object-fit: cover;
        }
        .user-name { font-size: 26px; font-weight: 900; }

        .checkout-box {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 136, 255, 0.2);
        }
        .checkout-title { font-size: 13px; font-weight: 900; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; }
        .checkout-price { font-size: 45px; font-weight: 900; color: var(--price-green); margin: 25px 0; }
        
        .bank-details {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 25px;
            text-align: left;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .detail-row { margin-bottom: 18px; }
        .detail-label { font-size: 11px; color: #5c657a; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .detail-val { font-size: 17px; font-weight: 700; color: #fff; font-family: 'Courier New', monospace; letter-spacing: 1px; }

        .btn-pay {
            background: var(--blue-grad);
            color: #fff;
            width: 100%;
            padding: 22px;
            border-radius: 24px;
            border: none;
            font-weight: 900;
            font-size: 17px;
            letter-spacing: 1px;
            box-shadow: 0 15px 30px rgba(0, 136, 255, 0.3);
            cursor: pointer;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,15,30,0.98);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-content { max-width: 500px; margin: 30px auto; }
        .upload-area {
            background: rgba(0,136,255,0.05);
            border: 2px dashed var(--neon-blue);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
        }
        .upload-area i { font-size: 48px; color: var(--neon-blue); margin-bottom: 15px; }
        
        #previewImage {
            max-width: 100%;
            border-radius: 20px;
            margin: 15px 0;
            display: none;
        }
        
        .comment-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 18px;
            color: #fff;
            font-size: 14px;
            margin: 15px 0;
            resize: vertical;
        }
        
        .btn-send {
            background: var(--price-green);
            color: #000;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-wrapper">
        <div class="logo-main"><i class="fas fa-ghost"></i></div>
    </div>
    <div class="brand-title">SAIKA PREMIUM</div>
    <div class="brand-subtitle">Private VPN Solutions</div>
</div>

<div class="navigation">
    <div class="nav-link active" onclick="tab('shop')">Витрина</div>
    <div class="nav-link" onclick="tab('profile')">Аккаунт</div>
</div>

<div id="shop" class="page active">
    <div class="section-header"><i class="fas fa-shield-halved"></i> VPN SERVICES</div>
    <div id="list-vpn"></div>

    <div class="section-header"><i class="fas fa-box-open"></i> BUNDLES & MAGNETS</div>
    <div id="list-extra"></div>

    <div class="section-header"><i class="fas fa-globe"></i> DNS MODS</div>
    <div id="list-dns"></div>
</div>

<div id="profile" class="page">
    <div class="profile-container">
        <img id="u-avatar" class="user-pic" src="https://via.placeholder.com/150">
        <h2 id="u-name" class="user-name">Premium Client</h2>
        <p id="u-id" style="color:#5c657a; font-size:13px; margin-top:8px; font-weight:600;">UID: 000000000</p>
    </div>
</div>

<div id="pay" class="page">
    <div class="checkout-box">
        <div class="checkout-title">Payment Invoice</div>
        <h3 id="pay-name" style="margin-top:15px; font-weight:800;">Product Name</h3>
        <div class="checkout-price" id="pay-total">0 ₽</div>
        
        <div class="bank-details">
            <div class="detail-row"><span class="detail-label">Банк:</span><b class="detail-val">Т-Банк</b></div>
            <div class="detail-row"><span class="detail-label">Карта:</span><b class="detail-val">2200 7021 4895 7363</b></div>
            <div class="detail-row"><span class="detail-label">Получатель:</span><b class="detail-val">Саид К.</b></div>
        </div>
        
        <button class="btn-pay" onclick="openUploadModal()">Я ОПЛАТИЛ, ЗАГРУЗИТЬ ЧЕК</button>
        <p style="margin-top:20px; font-size:12px; color:#5c657a; font-weight:700; cursor:pointer;" onclick="tab('shop')">ОТМЕНИТЬ</p>
    </div>
</div>

<div class="modal-overlay" id="uploadModal">
    <div class="modal-content">
        <div class="checkout-box">
            <div class="checkout-title">📎 ПОДТВЕРЖДЕНИЕ</div>
            <h3 id="modal-item-name" style="margin:15px 0 5px; font-weight:800;">Товар</h3>
            <div style="font-size:30px; font-weight:900; color:var(--price-green);" id="modal-item-price">0 ₽</div>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p style="font-size:14px; font-weight:600;">Нажмите чтобы загрузить скриншот</p>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(this)">
            
            <img id="previewImage" src="" alt="Preview">
            
            <textarea class="comment-input" id="orderComment" placeholder="Комментарий к платежу..."></textarea>
            
            <button class="btn-send" id="sendBtn" onclick="sendOrderToBot()" disabled>ОТПРАВИТЬ НА ПРОВЕРКУ</button>
            
            <p style="margin-top:15px; font-size:12px; color:#5c657a; cursor:pointer;" onclick="closeModal()">← Назад</p>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let currentOrder = {};
    let selectedFile = null;

    const products = {
        vpn: [
            {n:"SAIKA S1 VPN", p:79, o:1199, s:9, i:"fa-rocket"},
            {n:"VIP VPN", p:79, o:529, s:10, i:"fa-crown"},
            {n:"GTR VPN", p:79, o:899, s:"∞", i:"fa-car-burst"},
            {n:"ULTRA MAX VPN", p:79, o:629, s:8, i:"fa-fire-flame-curved"},
            {n:"STRONG VPN", p:79, o:499, s:"∞", i:"fa-bolt-lightning"},
            {n:"UNLY VPN", p:79, o:399, s:"∞", i:"fa-infinity"},
            {n:"TDM SKILL VPN", p:79, o:199, s:"∞", i:"fa-bullseye"},
            {n:"FUCK VPN", p:49, o:139, s:"∞", i:"fa-skull-crossbones"},
            {n:"DEAD ALL VPN", p:79, o:1299, s:"∞", i:"fa-ghost"}
        ],
        extra: [
            {n:"Магнит андроид", p:169, o:259, s:"∞", i:"fa-microchip"},
            {n:"Магнит ios", p:269, o:null, s:"∞", i:"fa-apple-whole"},
            {n:"Пак сайки", p:639, o:1789, s:"∞", i:"fa-cubes-stacked"},
            {n:"Пак unly", p:79, o:1299, s:10, i:"fa-box-archive"}
        ],
        dns: [
            {n:"DNS android", p:129, o:239, s:"∞", i:"fa-fingerprint"},
            {n:"DNS Ios", p:129, o:239, s:"∞", i:"fa-mobile-vibration"}
        ]
    };

    function render() {
        for(let cat in products) {
            products[cat].forEach(p => {
                const el = `
                <div class="product-card" onclick="startPay('${p.n}', ${p.p})">
                    <div class="product-icon"><i class="fas ${p.i}"></i></div>
                    <div class="product-info">
                        <div class="product-name">${p.n}</div>
                        <div class="price-container">
                            <span class="price-new">${p.p} ₽</span>
                            ${p.o ? `<span class="price-old">${p.o} ₽</span>` : ''}
                        </div>
                        <div class="availability">В наличии: ${p.s} шт.</div>
                    </div>
                </div>`;
                document.getElementById('list-' + cat).innerHTML += el;
            });
        }
    }

    function tab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'shop' || id === 'profile') {
            document.querySelectorAll('.nav-link')[id === 'shop' ? 0 : 1].classList.add('active');
        }
        document.getElementById('uploadModal').style.display = 'none';
    }

    function startPay(name, price) {
        currentOrder = {name, price};
        document.getElementById('pay-name').innerText = name;
        document.getElementById('pay-total').innerText = price + ' ₽';
        tab('pay');
    }

    function openUploadModal() {
        document.getElementById('modal-item-name').innerText = currentOrder.name;
        document.getElementById('modal-item-price').innerText = currentOrder.price + ' ₽';
        document.getElementById('uploadModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('uploadModal').style.display = 'none';
        selectedFile = null;
        document.getElementById('previewImage').style.display = 'none';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('fileInput').value = '';
    }

    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('previewImage');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('sendBtn').disabled = false;
            };
            reader.readAsDataURL(selectedFile);
        }
    }

    async function sendOrderToBot() {
        const user = tg.initDataUnsafe.user;
        const comment = document.getElementById('orderComment').value;
        
        const orderData = {
            product: currentOrder.name,
            price: currentOrder.price,
            user_id: user?.id,
            username: user?.username || user?.first_name,
            comment: comment,
            timestamp: new Date().toISOString()
        };
        
        if (selectedFile) {
            const reader = new FileReader();
            reader.onload = (e) => {
                orderData.screenshot = e.target.result;
                tg.sendData(JSON.stringify(orderData));
                tg.showPopup({title: '✅ Заказ отправлен!', message: 'Ожидайте проверки', buttons: [{type: 'ok'}]});
                setTimeout(() => tg.close(), 2000);
            };
            reader.readAsDataURL(selectedFile);
        } else {
            tg.sendData(JSON.stringify(orderData));
            setTimeout(() => tg.close(), 1000);
        }
    }

    const u = tg.initDataUnsafe.user;
    if(u) {
        document.getElementById('u-name').innerText = u.first_name + (u.last_name ? ' ' + u.last_name : '');
        document.getElementById('u-id').innerText = "ID: " + u.id;
        if(u.photo_url) document.getElementById('u-avatar').src = u.photo_url;
    }

    render();
    tg.MainButton.hide();
</script>
</body>
</html>
